name: Deploy barbier to Scaleway

on:
  workflow_dispatch:

env:
  APP_NAME: barbier
  PORT: 8080
  CONTEXT_DIR: .
  REGISTRY: rg.fr-par.scw.cloud/958-registry
  SCW_REGION: fr-par
  NAMESPACE_ID: 68691d55-c8d9-4d6a-84e0-a4d33d1be21d

concurrency:
  group: deploy-barbier
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Scaleway Registry
        uses: docker/login-action@v3
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT_DIR }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.APP_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.APP_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Scaleway CLI
        run: |
          curl -sL https://github.com/scaleway/scaleway-cli/releases/download/v2.55.0/scaleway-cli_2.55.0_linux_amd64 -o /usr/local/bin/scw
          chmod +x /usr/local/bin/scw

      - name: Configure scw
        run: |
          mkdir -p ~/.config/scw
          cat > ~/.config/scw/config.yaml <<EOF
          access_key: ${{ secrets.SCW_ACCESS_KEY }}
          secret_key: ${{ secrets.SCW_SECRET_KEY }}
          default_project_id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
          default_organization_id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
          default_region: ${{ env.SCW_REGION }}
          default_zone: fr-par-1
          send_telemetry: false
          EOF

      - name: Deploy (idempotent — create or update)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.APP_NAME }}:${{ github.sha }}
          NS_ID: ${{ env.NAMESPACE_ID }}
          APP: ${{ env.APP_NAME }}
          REG: ${{ env.SCW_REGION }}
          PORT: ${{ env.PORT }}
        run: |
          set -e
          CONTAINER_ID=$(scw container container list name="$APP" namespace-id="$NS_ID" region="$REG" -o json \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['id'] if d else '')")
          if [ -n "$CONTAINER_ID" ]; then
            echo "→ UPDATE container $CONTAINER_ID"
            scw container container update "$CONTAINER_ID" \
              registry-image="$IMAGE" \
              redeploy=true \
              region="$REG"
          else
            echo "→ CREATE container $APP"
            scw container container create \
              namespace-id="$NS_ID" \
              name="$APP" \
              registry-image="$IMAGE" \
              port="$PORT" \
              min-scale=1 \
              max-scale=3 \
              cpu-limit=500 \
              memory-limit=512 \
              privacy=public \
              protocol=http1 \
              deploy=true \
              region="$REG"
          fi

      - name: Get public URL
        env:
          NS_ID: ${{ env.NAMESPACE_ID }}
          APP: ${{ env.APP_NAME }}
          REG: ${{ env.SCW_REGION }}
        run: |
          sleep 10
          CONTAINER_ID=$(scw container container list name="$APP" namespace-id="$NS_ID" region="$REG" -o json \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['id'] if d else '')")
          DOMAIN=$(scw container container get "$CONTAINER_ID" region="$REG" -o json \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('domain_name',''))")
          echo "### Deploy barbier ✓" >> $GITHUB_STEP_SUMMARY
          echo "- **URL** : https://$DOMAIN" >> $GITHUB_STEP_SUMMARY
          echo "- **Container ID** : \`$CONTAINER_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image** : \`${{ env.REGISTRY }}/${{ env.APP_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
